syntax = "proto3";

package acme.user.v1;

import "acme/common/v1/common.proto";

service UserService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc SearchUsers(SearchUsersRequest) returns (SearchUsersResponse);
  rpc SearchUsersStream(SearchUsersRequest) returns (stream SearchUsersStreamResponse);
}

enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_INACTIVE = 2;
  USER_STATUS_SUSPENDED = 3;
}

message UserProfile {
  string full_name = 1;
  repeated acme.common.v1.Address addresses = 2;
  map<string, string> preferences = 3;
}

message User {
  string user_id = 1;
  string email = 2;
  bool is_active = 3;
  repeated string roles = 4;
  UserProfile profile = 5;
  map<string, string> attributes = 6;

  // Presence-aware optional field example.
  optional string phone_number = 7;

  // Enum example (prefer this over stringly-typed statuses).
  optional UserStatus status = 8;

  reserved 9 to 12;
  reserved "legacy_status";
}

message GetUserRequest {
  string user_id = 1;
  acme.common.v1.RequestContext context = 2;
  acme.common.v1.Actor actor = 3;
  repeated string include_fields = 4;
  map<string, string> headers = 5;
}

message GetUserResponse {
  User user = 1;
  acme.common.v1.RequestContext context = 2;
}

message SearchUsersRequest {
  string query = 1;
  bool active_only = 2;
  acme.common.v1.Pagination page = 3;
  acme.common.v1.RequestContext context = 4;
  acme.common.v1.Actor actor = 5;
  map<string, string> headers = 6;

  // Example: keep a deprecated knob rather than removing it.
  optional bool include_deleted = 7 [deprecated = true];
}

message SearchUsersResponse {
  repeated User users = 1;
  acme.common.v1.PageInfo page = 2;
  acme.common.v1.RequestContext context = 3;
}

message SearchUsersStreamResponse {
  User user = 1;
  acme.common.v1.RequestContext context = 2;
  int32 index = 3;
  bool is_last = 4;

  reserved 5;
}

