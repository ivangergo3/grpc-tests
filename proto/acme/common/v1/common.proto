syntax = "proto3";

package acme.common.v1;

message RequestContext {
  string request_id = 1;
  // Optional correlation/tracing fields (presence-aware).
  optional string trace_id = 2;
  optional string correlation_id = 3;

  reserved 4 to 9;
  reserved "legacy_trace", "legacy_correlation";
}

message Actor {
  string subject = 1;
  string tenant = 2;
  repeated string roles = 3;

  // Example of a deprecated field kept for compatibility.
  optional string user_id = 4 [deprecated = true];
  reserved 5;
}

message Address {
  string line1 = 1;
  string line2 = 2;
  string city = 3;
  string postal_code = 4;
  string country = 5;
}

message Money {
  // Decimal as string for simplicity in this demo.
  string amount = 1;
  // Prefer currency_code; kept for backwards compatibility.
  string currency = 2 [deprecated = true];
  optional CurrencyCode currency_code = 3;
  reserved 4;
}

message Pagination {
  int32 page_size = 1;
  string page_token = 2;
}

message PageInfo {
  string next_page_token = 1;
}

enum CurrencyCode {
  CURRENCY_CODE_UNSPECIFIED = 0;
  CURRENCY_CODE_EUR = 1;
  CURRENCY_CODE_USD = 2;
  CURRENCY_CODE_GBP = 3;
}

