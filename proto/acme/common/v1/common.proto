syntax = "proto3";

package acme.common.v1;

message RequestContext {
  string request_id = 1;
}

message Actor {
  string subject = 1;
  string tenant = 2;
  repeated string roles = 3;
}

message Address {
  string line1 = 1;
  string line2 = 2;
  string city = 3;
  string postal_code = 4;
  string country = 5;
}

message Money {
  // Decimal as string for simplicity in this demo.
  string amount = 1;
  string currency = 2;
}

message Pagination {
  int32 page_size = 1;
  string page_token = 2;
}

message PageInfo {
  string next_page_token = 1;
}


