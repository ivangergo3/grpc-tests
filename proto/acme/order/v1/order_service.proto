syntax = "proto3";

package acme.order.v1;

import "acme/common/v1/common.proto";

service OrderService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc ListOrders(ListOrdersRequest) returns (ListOrdersResponse);
}

message OrderItem {
  string sku = 1;
  int32 quantity = 2;
  acme.common.v1.Money unit_price = 3;
  map<string, string> attributes = 4;
}

message Order {
  string order_id = 1;
  string user_id = 2;
  string status = 3;
  repeated OrderItem items = 4;
  acme.common.v1.Money total = 5;
  map<string, string> metadata = 6;
}

message CreateOrderRequest {
  string user_id = 1;
  acme.common.v1.RequestContext context = 2;
  acme.common.v1.Actor actor = 3;
  repeated OrderItem items = 4;
  acme.common.v1.Address shipping_address = 5;
  map<string, string> headers = 6;
}

message CreateOrderResponse {
  Order order = 1;
  acme.common.v1.RequestContext context = 2;
}

message GetOrderRequest {
  string order_id = 1;
  acme.common.v1.RequestContext context = 2;
  map<string, string> headers = 3;
}

message GetOrderResponse {
  Order order = 1;
  acme.common.v1.RequestContext context = 2;
}

message ListOrdersRequest {
  string user_id = 1;
  string status = 2;
  acme.common.v1.Pagination page = 3;
  acme.common.v1.RequestContext context = 4;
  map<string, string> headers = 5;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  acme.common.v1.PageInfo page = 2;
  acme.common.v1.RequestContext context = 3;
}

