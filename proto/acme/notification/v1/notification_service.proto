syntax = "proto3";

package acme.notification.v1;

import "acme/common/v1/common.proto";

service NotificationService {
  rpc SendEmail(SendEmailRequest) returns (SendEmailResponse);
  rpc SendSms(SendSmsRequest) returns (SendSmsResponse);
}

message EmailAttachment {
  string filename = 1;
  string content_type = 2;
  bytes content = 3;
}

message SendEmailRequest {
  string message_id = 1;
  string to = 2;
  string subject = 3;
  string body = 4;
  repeated EmailAttachment attachments = 5;
  map<string, string> headers = 6;
  acme.common.v1.RequestContext context = 7;
  acme.common.v1.Actor actor = 8;
}

message SendEmailResponse {
  string message_id = 1;
  string status = 2;
  map<string, string> metadata = 3;
  acme.common.v1.RequestContext context = 4;
}

message SendSmsRequest {
  string message_id = 1;
  string to = 2;
  string text = 3;
  map<string, string> headers = 4;
  acme.common.v1.RequestContext context = 5;
  acme.common.v1.Actor actor = 6;
}

message SendSmsResponse {
  string message_id = 1;
  string status = 2;
  map<string, string> metadata = 3;
  acme.common.v1.RequestContext context = 4;
}

