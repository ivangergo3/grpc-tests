syntax = "proto3";

package acme.audit.v1;

import "acme/common/v1/common.proto";

service AuditService {
  rpc WriteEvent(WriteAuditEventRequest) returns (WriteAuditEventResponse);
  rpc ListEvents(ListAuditEventsRequest) returns (ListAuditEventsResponse);
}

message AuditEvent {
  string event_id = 1;
  string timestamp = 2;
  string type = 3;
  string entity_type = 4;
  string entity_id = 5;
  acme.common.v1.Actor actor = 6;
  map<string, string> details = 7;
}

message WriteAuditEventRequest {
  AuditEvent event = 1;
  acme.common.v1.RequestContext context = 2;
  map<string, string> headers = 3;
}

message WriteAuditEventResponse {
  string event_id = 1;
  string status = 2;
  acme.common.v1.RequestContext context = 3;
}

message ListAuditEventsRequest {
  string entity_type = 1;
  string entity_id = 2;
  string type = 3;
  acme.common.v1.Pagination page = 4;
  acme.common.v1.RequestContext context = 5;
  map<string, string> headers = 6;
}

message ListAuditEventsResponse {
  repeated AuditEvent events = 1;
  acme.common.v1.PageInfo page = 2;
  acme.common.v1.RequestContext context = 3;
}

