name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start test-server
        run: |
          bun run test-server > test-server.log 2>&1 &
          echo $! > test-server.pid
          timeout 30 bash -c 'until (echo > /dev/tcp/127.0.0.1/50051) >/dev/null 2>&1; do sleep 1; done'

      - name: Run tests
        run: bun run test
        env:
          TEST_SERVER_BASE_URL: 127.0.0.1:50051
          TEST_TIMEOUT_MS: "30000"
          HOOK_TIMEOUT_MS: "30000"
          RUN_TIMEOUT_MS: "0"
          VITEST_RETRY: "0"
          EXPECT_POLL_TIMEOUT_MS: "5000"
          EXPECT_POLL_INTERVAL_MS: "50"
          JUNIT_OUTPUT_FILE: test-results/junit.xml
          ALLURE_RESULTS_DIR: allure-results
          LOG_LEVEL: info

      - name: Set up Java (for Allure report)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Generate Allure report
        id: allure
        if: always()
        run: bun run allure:generate
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            allure-results/
            test-server.log
          retention-days: 14

      - name: Upload Allure report
        id: upload_allure
        if: always() && steps.allure.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Comment PR with Allure report link
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const isPr = context.eventName === "pull_request"
            if (!isPr) return
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const artifactUrl = `${{ steps.upload_allure.outputs.artifact-url || '' }}`
            const body = [
              "## Test report",
              "",
              `- **Run**: ${runUrl}`,
              artifactUrl ? `- **Allure report artifact**: ${artifactUrl}` : "- **Allure report artifact**: (not generated)",
              "",
              "Download the artifact and open `index.html` locally.",
            ].join("\\n")
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            })

      - name: Stop test-server
        if: always()
        run: |
          if [ -f test-server.pid ]; then
            kill "$(cat test-server.pid)" || true
          fi
