name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser + deps
        run: node ./node_modules/.bin/playwright install --with-deps chromium

      - name: Start test-server
        run: |
          bun run test-server > test-server.log 2>&1 &
          echo $! > test-server.pid
          timeout 30 bash -c 'until (echo > /dev/tcp/127.0.0.1/50051) >/dev/null 2>&1; do sleep 1; done'

      - name: Clean previous reports
        run: bun run allure:clean

      - name: Run API tests (Allure)
        run: bun run test:api:allure || true
        env:
          TEST_SERVER_BASE_URL: 127.0.0.1:50051
          TEST_TIMEOUT: "30000"
          HOOK_TIMEOUT: "30000"
          RUN_TIMEOUT: "0"
          VITEST_RETRY: "0"
          EXPECT_POLL_TIMEOUT: "5000"
          EXPECT_POLL_INTERVAL: "50"
          JUNIT_OUTPUT_FILE: test-results/junit.xml
          LOG_LEVEL: info

      - name: Run UI tests (Allure)
        run: bun run test:ui:allure || true
        env:
          TEST_SERVER_BASE_URL: 127.0.0.1:50051
          PLAYWRIGHT_BASE_URL: https://example.com
          PLAYWRIGHT_TEST_TIMEOUT: "30000"
          PLAYWRIGHT_EXPECT_TIMEOUT: "5000"
          PLAYWRIGHT_ACTION_TIMEOUT: "10000"
          PLAYWRIGHT_RETRIES: "0"
          LOG_LEVEL: info

      - name: Set up Java (for Allure report)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Merge + generate Allure report
        id: allure
        if: always()
        run: bun run allure:generate:merged
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            allure-results-api/
            allure-results-ui/
            allure-results/
            test-server.log
          retention-days: 14

      - name: Upload Allure report
        id: upload_allure
        if: always() && steps.allure.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Comment PR with Allure report link
        if: always()
        uses: actions/github-script@v7
        env:
          ALLURE_ARTIFACT_URL: ${{ steps.upload_allure.outputs['artifact-url'] }}
        with:
          script: |
            const isPr = context.eventName === "pull_request"
            if (!isPr) return
            const fs = require("fs");
            const path = require("path");

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const artifactUrl = process.env.ALLURE_ARTIFACT_URL || ""

            // Summarize test statuses from merged Allure results.
            // We count only "*-result.json" files (one per test case).
            const resultsDir = path.join(process.env.GITHUB_WORKSPACE, "allure-results");
            const counts = { passed: 0, failed: 0, skipped: 0, unknown: 0, total: 0 };
            try {
              if (fs.existsSync(resultsDir)) {
                const files = fs.readdirSync(resultsDir).filter((f) => f.endsWith("-result.json"));
                for (const f of files) {
                  const raw = fs.readFileSync(path.join(resultsDir, f), "utf8");
                  const j = JSON.parse(raw);
                  const status = String(j.status || "unknown").toLowerCase();
                  counts.total++;
                  if (status === "passed") counts.passed++;
                  else if (status === "skipped") counts.skipped++;
                  else if (status === "failed" || status === "broken") counts.failed++;
                  else counts.unknown++;
                }
              }
            } catch (e) {
              // If parsing fails, keep counts at zero and continue.
            }

            const summaryLine =
              counts.total > 0
                ? `- **Summary**: ${counts.passed} passed, ${counts.failed} failed, ${counts.skipped} skipped` +
                  (counts.unknown ? `, ${counts.unknown} unknown` : "") +
                  ` (total ${counts.total})`
                : `- **Summary**: (no results found in \`allure-results/\`)`;

            const body = [
              "## Test report",
              "",
              `- **Run**: ${runUrl}`,
              summaryLine,
              artifactUrl ? `- **Allure report artifact**: ${artifactUrl}` : "- **Allure report artifact**: (not generated)",
              "",
              "### View the Allure report locally",
              "- Download the **allure-report** artifact from the run and open `index.html`.",
              "- Or generate/serve locally from results:",
              "  - `bun run allure:local`",
              "  - `bun run allure:serve`",
            ].join("\\n")
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            })

      - name: Stop test-server
        if: always()
        run: |
          if [ -f test-server.pid ]; then
            kill "$(cat test-server.pid)" || true
          fi
