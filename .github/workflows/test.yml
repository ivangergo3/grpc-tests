name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock', 'bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Set up Java (for Allure report)
        if: always()
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Generate Allure report
        id: allure
        if: always()
        run: bun run allure:generate
        continue-on-error: true

      - name: Fix Allure report base path for GitHub Pages
        if: always() && steps.allure.outcome == 'success'
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          BASE_HREF="/${REPO_NAME}/"
          for f in allure-report/*.html; do
            [ -f "$f" ] && sed -i "s|<head>|<head><base href=\"${BASE_HREF}\">|" "$f"
          done

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results/
            allure-results/
          retention-days: 14

      - name: Upload Allure report
        if: always() && steps.allure.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 14

      - name: Upload Allure report for GitHub Pages
        if: always() && steps.allure.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

  deploy-report:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
        continue-on-error: true  # 404 until Pages enabled: Settings → Pages → Source: GitHub Actions
